<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark — IBM SkillsBuild Course Advisor</title>
    <meta name="description"
        content="Spark is your personal IBM SkillsBuild course advisor. Get matched with the best courses for your education level and interests." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <div class="header-inner">
                <div class="brand">
                    <div class="spark-icon">⚡</div>
                    <div class="brand-text">
                        <h1>Spark</h1>
                        <span class="subtitle">IBM SkillsBuild Course Advisor</span>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="btn-restart" class="btn-ghost" title="Start over">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 4v6h6" />
                            <path d="M3.51 15a9 9 0 105.64-12.36L1 10" />
                        </svg>
                        <span>Start Over</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <main id="chat-area">
            <div id="messages"></div>
        </main>

        <!-- Quick Replies (contextual) -->
        <div id="quick-replies" class="quick-replies hidden"></div>

        <!-- Input Area -->
        <footer id="input-area">
            <div class="input-container">
                <textarea id="user-input" placeholder="Ask Spark about IBM SkillsBuild courses..." rows="1"></textarea>
                <button id="btn-send" class="btn-send" title="Send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </div>
            <p class="disclaimer">Spark only recommends courses from the verified IBM SkillsBuild catalogue.</p>
        </footer>
    </div>

    <script src="catalogue.js"></script>
    <script src="engine.js"></script>
    <script src="app.js"></script>
</body>

</html>
